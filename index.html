<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fake USDT Value Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.7.1/dist/web3.min.js"></script>
</head>
<body>
  <h1>Fake USDT Value Checker</h1>
  <input type="text" id="address" placeholder="Enter your wallet address" />
  <button onclick="getFakeValue()">Get Fake Value</button>
  <p id="result"></p>

  <script>
    const web3 = new Web3('https://api.tron.network');

    async function getFakeValue() {
      const address = document.getElementById('address').value;
      const contractAddress = 'TKwvBZ8EYTkcCMoQVLqejPSGP9Uo84h36u';

      const contract = new web3.eth.Contract([
        {
          constant: true,
          inputs: [{ name: "_user", type: "address" }],
          name: "getFakeValue",
          outputs: [{ name: "value", type: "uint256" }],
          type: "function"
        }
      ], contractAddress);

      try {
        const result = await contract.methods.getFakeValue(address).call();
        document.getElementById('result').innerText = 'Fake USDT Value: ' + result;
      } catch (e) {
        document.getElementById('result').innerText = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
